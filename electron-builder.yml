appId: com.seos.app
productName: Seos
directories:
  output: dist-installer

files:
  - dist-electron/**
  - package.json

extraResources:
  - from: .next/standalone
    to: standalone
  - from: prisma/migrations
    to: prisma/migrations

# Real, confirmed electron-builder behavior: when a directory copied via
# extraResources itself contains a "node_modules" folder, electron-builder
# silently drops that inner node_modules entirely rather than copying it
# verbatim — it always routes any "node_modules" it finds through its own
# dependency-collection/pruning logic (meant for the project's OWN
# dependency tree, not an arbitrary bundled one), and .next/standalone's
# node_modules isn't reachable from that logic since it isn't referenced
# by this project's own package.json. Confirmed by inspecting a real
# packaged .app: Resources/standalone/ only ever contained package.json +
# server.js, node_modules missing every time, even with an added
# `filter: ["**/*"]` (had no effect). Fixed by copying it ourselves after
# packaging via afterPack — the one hook that runs once electron-builder's
# own copy/prune step is fully done.
afterPack: scripts/after-pack.cjs

# better-sqlite3's compiled .node binary can't be loaded from inside an
# asar archive — unpack it (and anything that requires it transitively)
# so Node's native module loader can find it on the real filesystem.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# electron-builder rebuilds native deps (better-sqlite3) against Electron's
# own Node ABI automatically as part of packaging — not the system Node
# used for `npm install` during development.
npmRebuild: true

# GitHub Releases is what electron-updater (see electron/main.ts) polls for
# new versions. package.json now has a real "repository" field
# (Derange8/seos) electron-builder could infer this from, but owner/repo
# are spelled out here too so publishing doesn't silently depend on that
# field never drifting. Actually uploading requires GH_TOKEN (a PAT with
# repo/contents:write scope) in the environment and running
# `npm run electron:dist:publish` (electron-builder's own --publish
# always flag) — the plain `electron:dist` script never publishes, only
# builds locally.
publish:
  provider: github
  owner: Derange8
  repo: seos

mac:
  category: public.app-category.developer-tools
win:
  target: nsis
linux:
  target: AppImage
